      </div>
    </div>
    <div id="api-result"></div> <!-- API 結果和重新占卜按鈕 -->
	   <footer>
      <p><strong>By</strong> Lucas Oscar Wang 政德 ｜ Language Systems Governance Architect ｜ Wordsmith</p>
